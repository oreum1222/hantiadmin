<!DOCTYPE html>
<!-- 한티 MEXX 관리자 대시보드 · 디자인 토큰은 students.html(디자인2) 계승 -->
<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta name="theme-color" content="#0a0c10"/>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" type="image/png" sizes="32x32" href="mexx-symbol.png"/>
<script>(function(){try{var t=localStorage.getItem('mexx-theme'),d=document.documentElement;if(t==='light'){d.classList.remove('dark');d.classList.add('light');var m=document.querySelector('meta[name=theme-color]');if(m)m.content='#f6f8fc';}else{d.classList.add('dark');}}catch(e){}})();</script>
<title>운영 허브 | 김가경 국어 · 한티 MEXX</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = { darkMode:"class", theme:{ extend:{
    "colors":{ "background":"rgb(var(--c-background) / <alpha-value>)","surface-bright":"rgb(var(--c-surface-bright) / <alpha-value>)","surface":"rgb(var(--c-surface) / <alpha-value>)","surface-container-lowest":"rgb(var(--c-surface-container-lowest) / <alpha-value>)","surface-container-low":"rgb(var(--c-surface-container-low) / <alpha-value>)","surface-container":"rgb(var(--c-surface-container) / <alpha-value>)","surface-container-high":"rgb(var(--c-surface-container-high) / <alpha-value>)","surface-container-highest":"rgb(var(--c-surface-container-highest) / <alpha-value>)","outline-variant":"rgb(var(--c-outline-variant) / <alpha-value>)","outline":"rgb(var(--c-outline) / <alpha-value>)","on-surface":"rgb(var(--c-on-surface) / <alpha-value>)","on-surface-variant":"rgb(var(--c-on-surface-variant) / <alpha-value>)","secondary":"rgb(var(--c-secondary) / <alpha-value>)","on-secondary":"rgb(var(--c-on-secondary) / <alpha-value>)","secondary-fixed":"rgb(var(--c-secondary-fixed) / <alpha-value>)" },
    "fontFamily":{ "body":["Inter","Noto Sans KR","sans-serif"] }
  }}}
</script>
<link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="bg-background text-on-surface font-body text-[15px]" style="word-break:keep-all;overflow-wrap:break-word">

<!-- ═══ PIN 게이트 ═══ -->
<div id="pin-gate" class="fixed inset-0 z-[100] bg-background flex items-center justify-center p-6 hidden">
  <div class="w-full max-w-sm bg-surface-container-lowest border border-outline-variant rounded-2xl p-8 text-center">
    <img src="mexx-symbol.png" class="w-12 h-12 rounded-xl mx-auto mb-4" alt=""/>
    <h1 class="text-xl font-extrabold tracking-tight">김가경 <span class="text-secondary">국어</span> 운영 허브</h1>
    <p class="text-on-surface-variant text-[13px] mt-1.5 mb-6">관리자 전용 페이지입니다. PIN을 입력하세요.</p>
    <input id="pin-input" type="password" inputmode="numeric" autocomplete="off" maxlength="8"
      class="w-full text-center text-2xl tracking-[0.5em] bg-surface-container-low border border-outline-variant rounded-xl py-3 focus:border-secondary focus:ring-secondary"
      placeholder="····"/>
    <p id="pin-error" class="text-red-400 text-[13px] mt-3 h-4"></p>
    <button id="pin-submit" class="w-full mt-3 bg-secondary text-on-secondary font-bold rounded-xl py-3 hover:opacity-90 transition-opacity">입장</button>
  </div>
</div>

<!-- ═══ 앱 셸 ═══ -->
<div id="app-shell" class="hidden min-h-screen md:flex">

  <!-- 사이드바 (데스크톱) -->
  <aside class="hidden md:flex flex-col w-60 shrink-0 h-screen sticky top-0 bg-surface-bright border-r border-outline-variant">
    <div class="flex items-center gap-2.5 px-5 h-16 border-b border-outline-variant">
      <img class="w-7 h-7 rounded-md" src="mexx-symbol.png" alt="한티 MEXX"/>
      <div class="leading-tight">
        <div class="font-extrabold tracking-tight">김가경 <span class="text-secondary">국어</span></div>
        <div class="text-[11px] text-on-surface-variant">한티 MEXX 운영 허브</div>
      </div>
    </div>
    <nav id="side-nav" class="flex-1 px-3 py-4 space-y-1 overflow-y-auto"></nav>
    <div class="px-3 py-4 border-t border-outline-variant space-y-2">
      <div class="flex items-center justify-between px-2">
        <span id="role-badge" class="inline-flex items-center gap-1 text-[12px] font-semibold text-secondary bg-secondary-fixed/60 border border-secondary/25 rounded-full px-2.5 py-1"></span>
        <div class="flex gap-1">
          <button id="theme-toggle" class="w-9 h-9 rounded-lg hover:bg-surface-container flex items-center justify-center text-on-surface-variant" title="테마 전환"><span class="material-symbols-outlined text-[20px]">dark_mode</span></button>
          <button id="logout-btn" class="w-9 h-9 rounded-lg hover:bg-surface-container flex items-center justify-center text-on-surface-variant" title="잠금"><span class="material-symbols-outlined text-[20px]">lock</span></button>
        </div>
      </div>
      <div id="mode-badge" class="px-2 text-[11px] text-on-surface-variant"></div>
    </div>
  </aside>

  <!-- 본문 -->
  <div class="flex-1 min-w-0 flex flex-col">
    <!-- 모바일 헤더 -->
    <header class="md:hidden sticky top-0 z-40 bg-background/85 backdrop-blur border-b border-outline-variant flex items-center justify-between h-14 px-4">
      <div class="flex items-center gap-2"><img class="w-6 h-6 rounded" src="mexx-symbol.png" alt=""/><span class="font-extrabold text-[15px]">운영 허브</span></div>
      <div class="flex gap-1">
        <button id="theme-toggle-m" class="w-9 h-9 rounded-lg flex items-center justify-center text-on-surface-variant"><span class="material-symbols-outlined text-[20px]">dark_mode</span></button>
        <button id="logout-btn-m" class="w-9 h-9 rounded-lg flex items-center justify-center text-on-surface-variant"><span class="material-symbols-outlined text-[20px]">lock</span></button>
      </div>
    </header>

    <main id="view" class="flex-1 px-4 md:px-8 py-6 md:py-8 pb-24 md:pb-10 max-w-[1200px] w-full mx-auto"></main>
  </div>

  <!-- 하단 탭바 (모바일) -->
  <nav id="bottom-nav" class="md:hidden fixed bottom-0 inset-x-0 z-40 bg-surface-bright/95 backdrop-blur border-t border-outline-variant grid grid-cols-7"></nav>
</div>

<!-- 토스트 -->
<div id="toast-wrap" class="fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 z-[110] space-y-2 w-[calc(100%-2rem)] max-w-sm"></div>
<!-- 모달 -->
<div id="modal-root"></div>

<script src="js/config.js"></script>
<script src="js/seed.js"></script>
<script src="js/diagnosis-data.js"></script>
<script src="js/api.js"></script>
<script src="js/views/home.js"></script>
<script src="js/views/courses.js"></script>
<script src="js/views/students.js"></script>
<script src="js/views/attendance.js"></script>
<script src="js/views/makeup.js"></script>
<script src="js/views/notices.js"></script>
<script src="js/views/tasks.js"></script>
<script src="js/app.js"></script>
</body></html>
